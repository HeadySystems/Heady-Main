# Heady™ Platform — Deployment Pipeline
# Triggered on release published. Deploys to Cloud Run + Cloudflare Pages.
# All services operate as concurrent equals — NO priority ordering.
# © 2024-2026 HeadySystems Inc. All Rights Reserved.

name: Heady Deploy

on:
  release:
    types: [published]

env:
  NODE_VERSION: '20'
  PROJECT_ID: gen-lang-client-0920560496
  REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev/gen-lang-client-0920560496/heady-services
  VECTOR_DIM: '384'

jobs:
  # ─── Build & Push All Service Images ─────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 34  # Fibonacci
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push all service images
        run: |
          TAG="${{ github.event.release.tag_name }}"
          for svc_dir in services/*/; do
            svc=$(basename "$svc_dir")
            if [ -f "$svc_dir/Dockerfile" ]; then
              echo "Building and pushing $svc:$TAG..."
              docker build \
                -t "${{ env.REGISTRY }}/$svc:$TAG" \
                -t "${{ env.REGISTRY }}/$svc:latest" \
                "$svc_dir"
              docker push "${{ env.REGISTRY }}/$svc:$TAG"
              docker push "${{ env.REGISTRY }}/$svc:latest"
            fi
          done

  # ─── Deploy Services to Cloud Run ────────────────────────────────────────────
  deploy-services:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 55  # Fibonacci
    needs: [build-push]
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 8  # Fibonacci
      matrix:
        include:
          - service: heady-brain
            port: 3310
          - service: heady-brains
            port: 3311
          - service: heady-soul
            port: 3312
          - service: heady-conductor
            port: 3313
          - service: heady-infer
            port: 3314
          - service: heady-embed
            port: 3315
          - service: heady-memory
            port: 3316
          - service: heady-vector
            port: 3317
          - service: heady-projection
            port: 3318
          - service: heady-bee-factory
            port: 3319
          - service: heady-hive
            port: 3320
          - service: heady-orchestration
            port: 3321
          - service: heady-federation
            port: 3322
          - service: heady-guard
            port: 3323
          - service: heady-security
            port: 3324
          - service: heady-governance
            port: 3325
          - service: heady-health
            port: 3326
          - service: heady-eval
            port: 3327
          - service: heady-maintenance
            port: 3328
          - service: heady-testing
            port: 3329
          - service: heady-web
            port: 3330
          - service: heady-buddy
            port: 3331
          - service: heady-ui
            port: 3332
          - service: heady-onboarding
            port: 3333
          - service: heady-pilot-onboarding
            port: 3334
          - service: heady-task-browser
            port: 3335
          - service: auto-success-engine
            port: 3340
          - service: hcfullpipeline-executor
            port: 3341
          - service: heady-chain
            port: 3342
          - service: heady-cache
            port: 3343
          - service: ai-router
            port: 3350
          - service: api-gateway
            port: 3351
          - service: model-gateway
            port: 3352
          - service: domain-router
            port: 3353
          - service: mcp-server
            port: 3360
          - service: google-mcp
            port: 3361
          - service: memory-mcp
            port: 3362
          - service: perplexity-mcp
            port: 3363
          - service: jules-mcp
            port: 3364
          - service: huggingface-gateway
            port: 3365
          - service: colab-gateway
            port: 3366
          - service: silicon-bridge
            port: 3367
          - service: discord-bot
            port: 3368
          - service: heady-vinci
            port: 3380
          - service: heady-autobiographer
            port: 3381
          - service: heady-midi
            port: 3382
          - service: budget-tracker
            port: 3390
          - service: cli-service
            port: 3391
          - service: prompt-manager
            port: 3392
          - service: secret-gateway
            port: 3393
          - service: auth-session-server
            port: 3397
          - service: notification-service
            port: 3398
          - service: analytics-service
            port: 3399
          - service: billing-service
            port: 3400
          - service: search-service
            port: 3401
          - service: scheduler-service
            port: 3402
          - service: migration-service
            port: 3403
          - service: asset-pipeline
            port: 3404
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}

      - name: Deploy ${{ matrix.service }}
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ matrix.service }}
          image: ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.event.release.tag_name }}
          region: ${{ env.REGION }}
          flags: >-
            --port=${{ matrix.port }}
            --cpu=1
            --memory=512Mi
            --min-instances=0
            --max-instances=8
            --concurrency=55
            --timeout=89s
            --set-env-vars=NODE_ENV=production,SERVICE_PORT=${{ matrix.port }},VECTOR_DIM=384

      - name: Post-deploy health verification
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ matrix.service }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "Verifying health: $SERVICE_URL/health"
          for i in 1 2 3 5 8; do  # Fibonacci retries
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "${{ matrix.service }} healthy (HTTP 200)"
              exit 0
            fi
            echo "Retry $i: HTTP $HTTP_CODE — waiting ${i}s..."
            sleep $i
          done
          echo "WARNING: ${{ matrix.service }} health check did not return 200"
          exit 1

  # ─── Deploy Sites to Cloudflare Pages ────────────────────────────────────────
  deploy-sites:
    name: Deploy Sites
    runs-on: ubuntu-latest
    timeout-minutes: 21  # Fibonacci
    needs: [build-push]
    strategy:
      fail-fast: false
      matrix:
        site:
          - admin
          - heady-ai
          - headyconnection-com
          - headyconnection-org
          - headyex
          - headyfinance
          - headyme
          - headyos
          - headysystems
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build site
        run: |
          if [ -f "sites/${{ matrix.site }}/package.json" ]; then
            cd "sites/${{ matrix.site }}"
            npm ci
            npm run build 2>/dev/null || echo "No build script — deploying as-is"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ matrix.site }}
          directory: sites/${{ matrix.site }}/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ─── Post-Deploy Verification ────────────────────────────────────────────────
  verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    timeout-minutes: 13  # Fibonacci
    needs: [deploy-services, deploy-sites]
    steps:
      - uses: actions/checkout@v4
      - name: Verify all services
        run: |
          FAILED=0
          SERVICES=(
            heady-brain heady-brains heady-soul heady-conductor heady-infer
            heady-embed heady-memory heady-vector heady-projection
            heady-bee-factory heady-hive heady-orchestration heady-federation
            heady-guard heady-security heady-governance
            heady-health heady-eval heady-maintenance heady-testing
            heady-web heady-buddy heady-ui heady-onboarding heady-pilot-onboarding heady-task-browser
            auto-success-engine hcfullpipeline-executor heady-chain heady-cache
            ai-router api-gateway model-gateway domain-router
            mcp-server google-mcp memory-mcp perplexity-mcp jules-mcp
            huggingface-gateway colab-gateway silicon-bridge discord-bot
            heady-vinci heady-autobiographer heady-midi
            budget-tracker cli-service prompt-manager secret-gateway
            auth-session-server notification-service analytics-service billing-service
            search-service scheduler-service migration-service asset-pipeline
          )
          for svc in "${SERVICES[@]}"; do
            URL=$(gcloud run services describe "$svc" --region ${{ env.REGION }} --format 'value(status.url)' 2>/dev/null || echo "")
            if [ -n "$URL" ]; then
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" --max-time 8 || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "  $svc: HEALTHY"
              else
                echo "  $svc: UNHEALTHY (HTTP $HTTP_CODE)"
                FAILED=$((FAILED + 1))
              fi
            else
              echo "  $svc: NOT DEPLOYED"
              FAILED=$((FAILED + 1))
            fi
          done
          echo ""
          echo "Verification complete: $((${#SERVICES[@]} - FAILED))/${#SERVICES[@]} services healthy"
          if [ "$FAILED" -gt 0 ]; then
            echo "WARNING: $FAILED services unhealthy"
          fi
