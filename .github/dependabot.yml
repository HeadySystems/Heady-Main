version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      production:
        patterns:
          - "*"
        exclude-patterns:
          - "eslint*"
          - "@typescript-eslint*"
          - "jest*"
          - "@types/*"
      dev:
        dependency-type: "development"
    reviewers:
      - "HeadyMe"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
