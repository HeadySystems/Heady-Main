    branded_url:     https://api.headysystems.com/webhooks
    port:            443
    protocols:       [https]
    auth:            webhook_signatures

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# EDGE ROUTER CONFIG (heady-edge-router Worker)
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

edge_router:
  worker_name:       heady-edge-router
  source:            /home/headyme/Heady/cloudflare/wrangler.toml
  strategy:          host_header

  routing_rules:
    # Each incoming Host header is matched and routed to the appropriate origin
    - host_pattern:  "headyme.com"
      target:        cloud_run_origin
      fallback:      cloudflare_pages:headyme-com

    - host_pattern:  "headysystems.com"
      target:        cloud_run_origin
      fallback:      cloudflare_pages:headysystems-com

    - host_pattern:  "headyconnection.org"
      target:        cloud_run_origin
      fallback:      cloudflare_pages:headyconnection

    - host_pattern:  "headybuddy.org"
      target:        cloud_run_origin
      fallback:      cloudflare_pages:headybuddy

    - host_pattern:  "headymcp.com"
      target:        cloud_run_origin

    - host_pattern:  "headyapi.com"
      target:        cloud_run_origin
      fallback:      cloudflare_pages:headyapi

    - host_pattern:  "headyio.com"
      target:        cloud_run_origin
      fallback:      cloudflare_pages:headyio

    - host_pattern:  "headybot.com"
      target:        cloud_run_origin

    - host_pattern:  "headyai.com"
      target:        cloud_run_origin

  # Subdomain routing (*.headysystems.com, *.headyconnection.org, etc.)
  subdomain_rules:
    - pattern:       "api.headysystems.com"
      target:        cloud_run_origin
      path_prefix:   /api

    - pattern:       "app.headysystems.com"
      target:        cloud_run_origin
      path_prefix:   /app

    - pattern:       "admin.headysystems.com"
      target:        cloud_run_origin
      path_prefix:   /admin
      auth:          Basic + JWT

    - pattern:       "api.headyconnection.org"
      target:        cloud_run_origin
      path_prefix:   /api/connection
      auth:          API Key

    - pattern:       "app.headyconnection.org"
      target:        cloud_run_origin
      path_prefix:   /app/connection

    - pattern:       "api.headybuddy.org"
      target:        cloud_run_origin
      path_prefix:   /api/buddy

    - pattern:       "app.headybuddy.org"
      target:        cloud_run_origin
      path_prefix:   /app/buddy

    - pattern:       "mcp.headymcp.com"
      target:        cloud_run_origin
      path_prefix:   /mcp

    - pattern:       "api.headymcp.com"
      target:        cloud_run_origin
      path_prefix:   /api/mcp

    - pattern:       "api.headyme.com"
      target:        cloud_run_origin
      path_prefix:   /api/me

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# CSL ROUTING ENGINE
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Applied by csl-router.js when dispatching cross-domain requests.
# All numeric parameters are phi-scaled per Sacred Geometry principles.

routing:
  default_csl_gate:  0.618          # PSI вЂ” fallback gate for unregistered domains
  inter_domain_log:  true           # log all cross-domain routing decisions
  max_hops:          8              # fib(6) вЂ” maximum routing hops before reject
  timeout_ms:        6854           # phi^4 x 1000ms вЂ” cross-domain request timeout
  heartbeat_ms:      29034          # phi^7 вЂ” dynamic heartbeat interval

  csl_thresholds:
    PSI:             0.618          # standard gate (phi inverse)
    LOW:             0.691          # low alignment
    MEDIUM:          0.809          # moderate alignment
    HIGH:            0.882          # strong alignment
    CRITICAL:        0.927          # near-certain alignment

  pool_config:
    hot:
      description:   "Latency-critical services вЂ” sub-100ms target"
      members:       [headyme, headybuddy, headymcp, headyapi, headyai]
      max_latency:   100

    warm:
      description:   "Standard services вЂ” sub-500ms target"
      members:       [headysystems, headyconnection, headyio, headybot]
      max_latency:   500

