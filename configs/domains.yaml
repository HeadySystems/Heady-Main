# SERVICE ENDPOINTS (Branded вЂ” NO internal domains in user-facing config)
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# All service endpoints use branded domains routed through Cloudflare.
# Internal Cloud Run URLs are NEVER exposed in user-facing configuration.

service_endpoints:

  # Core orchestration
  heady-manager:
    branded_url:     https://api.headysystems.com
    port:            3300
    protocols:       [https, websocket]
    auth:            JWT + API Key
    health_check:    /api/health

  heady-buddy:
    branded_url:     https://app.headybuddy.org
    port:            5174
    protocols:       [https, websocket]
    auth:            JWT

  heady-conductor:
