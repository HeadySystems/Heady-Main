# SECURITY POLICIES
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

policies:
  https_everywhere:
    description:     "All production domains must use HTTPS with valid certificates"
    applies_to:      all

  no_internal_exposure:
    description:     "Never expose internal Cloud Run URLs, IPs, or api.headysystems.com in user-facing content"
    applies_to:      [docs, configs, examples, screenshots, error_messages]

  security_headers:
    description:     "All domains must include security headers via Cloudflare"
    headers:
      - Strict-Transport-Security
      - Content-Security-Policy
      - X-Frame-Options
      - X-Content-Type-Options
      - Referrer-Policy
      - Permissions-Policy

  zero_localhost:
    description:     "No localhost, 127.0.0.1, 0.0.0.0, or .local references in production config"
    enforcement:     strict

