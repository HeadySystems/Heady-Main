# Heady™ Envoy Sidecar Configuration
# © 2026 HeadySystems Inc. — Eric Haywood — 51 Provisional Patents
# φ-scaled timeouts: connect=1618ms(φ¹×1000), request=4236ms(φ³×1000)
# Fibonacci circuit breakers: max_connections=89(fib(11)), max_pending=55(fib(10))

static_resources:
  listeners:
    - name: heady_ingress
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: heady_ingress
                codec_type: AUTO
                route_config:
                  name: heady_routes
                  virtual_hosts:
                    - name: heady_services
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/api/v1/brain" }
                          route:
                            cluster: inference_cluster
                            timeout: 29.034s  # φ⁷ × 1000ms
                        - match: { prefix: "/api/v1/memory" }
                          route:
                            cluster: memory_cluster
                            timeout: 11.090s  # φ⁵ × 1000ms
                        - match: { prefix: "/api/v1/agents" }
                          route:
                            cluster: agents_cluster
                            timeout: 17.944s  # φ⁶ × 1000ms
                        - match: { prefix: "/api/v1/search" }
                          route:
                            cluster: search_cluster
                            timeout: 6.854s   # φ⁴ × 1000ms
                        - match: { prefix: "/auth" }
                          route:
                            cluster: auth_cluster
                            timeout: 4.236s   # φ³ × 1000ms
                        - match: { prefix: "/health" }
                          route:
                            cluster: health_cluster
                            timeout: 2.618s   # φ² × 1000ms
                        - match: { prefix: "/" }
                          route:
                            cluster: api_gateway_cluster
                            timeout: 4.236s   # φ³ × 1000ms
                http_filters:
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    - name: heady_tls_ingress
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8443
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                  - certificate_chain:
                      filename: /etc/envoy/certs/server.crt
                    private_key:
                      filename: /etc/envoy/certs/server.key
                validation_context:
                  trusted_ca:
                    filename: /etc/envoy/certs/ca.crt
              require_client_certificate: true
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: heady_mtls
                codec_type: AUTO
                route_config:
                  name: heady_internal_routes
                  virtual_hosts:
                    - name: internal
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: api_gateway_cluster
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: inference_cluster
      connect_timeout: 1.618s  # φ¹ × 1000ms
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - max_connections: 89         # fib(11)
            max_pending_requests: 55    # fib(10)
            max_requests: 144           # fib(12)
            max_retries: 3              # fib(4)
      load_assignment:
        cluster_name: inference_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: heady-brain, port_value: 3310 }
              - endpoint:
                  address:
                    socket_address: { address: heady-brains, port_value: 3311 }

    - name: memory_cluster
      connect_timeout: 1.618s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - max_connections: 89
            max_pending_requests: 55
            max_requests: 144
            max_retries: 3
      load_assignment:
        cluster_name: memory_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: heady-memory, port_value: 3316 }
              - endpoint:
                  address:
                    socket_address: { address: heady-embed, port_value: 3315 }

    - name: agents_cluster
      connect_timeout: 1.618s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - max_connections: 55
            max_pending_requests: 34
            max_requests: 89
            max_retries: 3
      load_assignment:
        cluster_name: agents_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: heady-bee-factory, port_value: 3319 }

    - name: search_cluster
      connect_timeout: 1.618s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - max_connections: 55
            max_pending_requests: 34
            max_requests: 89
            max_retries: 3
      load_assignment:
        cluster_name: search_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: search, port_value: 3364 }

    - name: auth_cluster
      connect_timeout: 1.618s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - max_connections: 89
            max_pending_requests: 55
            max_requests: 233
            max_retries: 3
      load_assignment:
        cluster_name: auth_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: auth-session, port_value: 3360 }

    - name: health_cluster
      connect_timeout: 1.618s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: health_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: heady-health, port_value: 3333 }

    - name: api_gateway_cluster
      connect_timeout: 1.618s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - max_connections: 144
            max_pending_requests: 89
            max_requests: 233
            max_retries: 3
      load_assignment:
        cluster_name: api_gateway_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: api-gateway, port_value: 3344 }

admin:
  access_log_path: /dev/null
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
