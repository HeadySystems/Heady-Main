version: "3.9"
    services:
      postgres:
        image: pgvector/pgvector:pg16
        environment:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: heady
        ports:
          - "5432:5432"
        volumes:
          - heady_postgres:/var/lib/postgresql/data

      redis:
        image: redis:7-bookworm
        ports:
          - "6379:6379"

      otel-collector:
        image: otel/opentelemetry-collector-contrib:0.120.0
        command: ["--config=/etc/otelcol/config.yaml"]
        volumes:
          - ./infra/otel/collector.yaml:/etc/otelcol/config.yaml:ro
        ports:
          - "4316:4316"
          - "9464:9464"


domain-router:
  build:
    context: .
    dockerfile: services/domain-router/Dockerfile
  environment:
    PORT: 4301
    DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
    REDIS_URL: redis://redis:6379
  ports:
    - "4301:4301"
  depends_on:
    - postgres
    - redis

