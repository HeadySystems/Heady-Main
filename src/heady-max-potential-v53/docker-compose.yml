version: '3.8'

services:

  auth-session:
    build: ./services/auth-session
    ports:
      - "3360:3360"
    environment:
      - SERVICE_PORT=3360
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3360/health"]
      interval: 29s    # ~PHI_TIMING.PHI_7/1000
      timeout: 11s     # ~PHI_TIMING.PHI_5/1000
      retries: 5       # fib(5)
    restart: unless-stopped

  notification:
    build: ./services/notification
    ports:
      - "3361:3361"
    environment:
      - SERVICE_PORT=3361
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3361/health"]
      interval: 29s
      timeout: 11s
      retries: 5
    restart: unless-stopped

  analytics:
    build: ./services/analytics
    ports:
      - "3362:3362"
    environment:
      - SERVICE_PORT=3362
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3362/health"]
      interval: 29s
      timeout: 11s
      retries: 5
    restart: unless-stopped

  scheduler:
    build: ./services/scheduler
    ports:
      - "3363:3363"
    environment:
      - SERVICE_PORT=3363
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3363/health"]
      interval: 29s
      timeout: 11s
      retries: 5
    restart: unless-stopped

  search:
    build: ./services/search
    ports:
      - "3364:3364"
    environment:
      - SERVICE_PORT=3364
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3364/health"]
      interval: 29s
      timeout: 11s
      retries: 5
    restart: unless-stopped

  onboarding:
    build: ./services/onboarding
    ports:
      - "3365:3365"
    environment:
      - SERVICE_PORT=3365
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3365/health"]
      interval: 29s
      timeout: 11s
      retries: 5
    restart: unless-stopped

  domain-router:
    build: ./services/domain-router
    ports:
      - "3366:3366"
    environment:
      - SERVICE_PORT=3366
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3366/health"]
      interval: 29s
      timeout: 11s
      retries: 5
    restart: unless-stopped

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "3370:3370"
    environment:
      - SERVICE_PORT=3370
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
    depends_on:
      - auth-session
      - domain-router
      - notification
      - analytics
      - scheduler
      - search
      - onboarding
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3370/health"]
      interval: 29s
      timeout: 11s
      retries: 5
    restart: unless-stopped
