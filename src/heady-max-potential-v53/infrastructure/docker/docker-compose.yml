# ═══════════════════════════════════════════════════════════════════════════════
# NETWORKS — one per domain for isolation, plus internal/external
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  heady-internal:
    driver: bridge
    internal: true
  heady-external:
    driver: bridge
  inference-net:
    driver: bridge
    internal: true
  memory-net:
    driver: bridge
    internal: true
  agents-net:
    driver: bridge
    internal: true
  orchestration-net:
    driver: bridge
    internal: true
  security-net:
    driver: bridge
    internal: true
  monitoring-net:
    driver: bridge
    internal: true
  web-net:
    driver: bridge
    internal: true
  data-net:
    driver: bridge
    internal: true
  integration-net:
    driver: bridge
    internal: true
  specialized-net:
    driver: bridge
    internal: true

# ═══════════════════════════════════════════════════════════════════════════════
# VOLUMES — persistent storage for infrastructure services
# ═══════════════════════════════════════════════════════════════════════════════

volumes:
  pgdata:
    driver: local
  natsdata:
    driver: local
  promdata:
    driver: local
  grafanadata:
    driver: local
  consuldata:
    driver: local
  envoy-certs:
    driver: local
