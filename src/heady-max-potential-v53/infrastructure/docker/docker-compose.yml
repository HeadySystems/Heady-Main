# © 2026 HeadySystems Inc. — Eric Haywood (eric@headysystems.com) — 51 Provisional Patents
# φ-scaled health checks: interval=4236ms(φ³×1000), timeout=2618ms(φ²×1000), retries=3(fib(4))
# All constants derive from φ (1.618033988...) or Fibonacci — ZERO magic numbers.

version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════════
# EXTENSION FIELDS — shared config anchors (DRY)
# ═══════════════════════════════════════════════════════════════════════════════

x-heady-healthcheck: &heady-healthcheck
  interval: 4236ms      # φ³ × 1000 = 4236ms
  timeout: 2618ms       # φ² × 1000 = 2618ms
  retries: 3            # fib(4) = 3
  start_period: 6854ms  # φ⁴ × 1000 = 6854ms

x-heady-service: &heady-service
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "13m"   # fib(7) = 13
      max-file: "5"     # fib(5) = 5
  deploy:
    resources:
      limits:
        memory: 233M    # fib(13) = 233
      reservations:
        memory: 89M     # fib(11) = 89

x-heady-brain-service: &heady-brain-service
  <<: *heady-service
  deploy:
    resources:
      limits:
        memory: 610M    # fib(15) = 610 — elevated for brain/memory services
      reservations:
        memory: 144M    # fib(12) = 144

x-heady-env: &heady-env
  NODE_ENV: production
  HEADY_VERSION: "5.1.0"
  PGVECTOR_URL: postgresql://heady:${PGVECTOR_PASSWORD}@pgvector:5432/heady
  REDIS_URL: redis://redis:6379
  NATS_URL: nats://nats:4222

x-heady-depends: &heady-depends
  pgvector: { condition: service_healthy }
  redis: { condition: service_healthy }
  nats: { condition: service_healthy }

# ═══════════════════════════════════════════════════════════════════════════════
# SERVICES
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ═══ INFRASTRUCTURE ═══════════════════════════════════════════════════════

  pgvector:
    image: pgvector/pgvector:pg16
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: heady
      POSTGRES_USER: heady
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heady"]
      <<: *heady-healthcheck
    networks: [heady-internal]
    deploy:
      resources:
        limits:
          memory: 610M    # fib(15) = 610
        reservations:
          memory: 233M    # fib(13) = 233

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --maxmemory 233mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *heady-healthcheck
    networks: [heady-internal]
    deploy:
      resources:
        limits:
          memory: 377M    # fib(14) = 377
        reservations:
          memory: 144M    # fib(12) = 144

  nats:
    image: nats:2-alpine
    ports: ["4222:4222", "8222:8222"]
    command: --jetstream --store_dir /data --max_mem 233MB
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      <<: *heady-healthcheck
    networks: [heady-internal]
    deploy:
      resources:
        limits:
          memory: 377M    # fib(14) = 377
        reservations:
          memory: 144M    # fib(12) = 144

  envoy:
    image: envoyproxy/envoy:v1.29-latest
    ports: ["8080:8080", "8443:8443", "9901:9901"]
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - envoy-certs:/etc/envoy/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://0.0.0.0:9901/ready || exit 1"]
      <<: *heady-healthcheck
    networks: [heady-internal, heady-external]
    deploy:
      resources:
        limits:
          memory: 233M    # fib(13) = 233
        reservations:
          memory: 89M     # fib(11) = 89

  consul:
    image: hashicorp/consul:1.17
    ports: ["8500:8500"]
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    volumes:
      - ./consul/consul-config.json:/consul/config/consul-config.json:ro
      - consuldata:/consul/data
    healthcheck:
      test: ["CMD", "consul", "members"]
      <<: *heady-healthcheck
    networks: [heady-internal]
    deploy:
      resources:
        limits:
          memory: 233M    # fib(13) = 233
        reservations:
          memory: 89M     # fib(11) = 89

  prometheus:
    image: prom/prometheus:v2.49.0
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:9090/-/healthy || exit 1"]
      <<: *heady-healthcheck
    networks: [heady-internal]
    deploy:
      resources:
        limits:
          memory: 377M    # fib(14) = 377
        reservations:
          memory: 144M    # fib(12) = 144

  grafana:
    image: grafana/grafana:10.3.0
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/heady-overview.json
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://0.0.0.0:3000/api/health || exit 1"]
      <<: *heady-healthcheck
    networks: [heady-internal]
    deploy:
      resources:
        limits:
          memory: 233M    # fib(13) = 233
        reservations:
          memory: 89M     # fib(11) = 89

  # ═══ INFERENCE DOMAIN (ports 3310-3314) ════════════════════════════════════

  heady-brain:
    <<: *heady-brain-service
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: heady-brain
    ports: ["3310:3310"]
    environment:
      <<: *heady-env
      SERVICE_NAME: heady-brain
      SERVICE_PORT: "3310"
      HEADY_DOMAIN: inference
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://0.0.0.0:3310/health',r=>{r.statusCode===200?process.exit(0):process.exit(1)}).on('error',()=>process.exit(1))"]
      <<: *heady-healthcheck
    depends_on:
      <<: *heady-depends
    networks: [inference-net, heady-internal]

