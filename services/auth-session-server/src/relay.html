<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heady Auth Relay</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <script>
      const WHITELISTED_ORIGINS = [
        'https://headysystems.com',
        'https://headyme.com',
        'https://heady-ai.com',
        'https://headyos.com',
        'https://headyfinance.com',
        'https://headychat.com',
        'https://headyvault.com',
        'https://headyconnect.com',
        'https://headyflow.com',
      ];

      const SUBDOMAIN_PATTERN = /^https:\/\/[a-z0-9-]*\.(headysystems\.com|headyme\.com|heady-ai\.com|headyos\.com|headyfinance\.com|headychat\.com|headyvault\.com|headyconnect\.com|headyflow\.com)$/;

      function isOriginWhitelisted(origin) {
        if (WHITELISTED_ORIGINS.includes(origin)) {
          return true;
        }

        if (SUBDOMAIN_PATTERN.test(origin)) {
          return true;
        }

        return false;
      }

      function getSessionCookie() {
        const name = '__Host-heady_session';
        const cookies = document.cookie.split(';');

        for (let cookie of cookies) {
          cookie = cookie.trim();
          if (cookie.startsWith(name + '=')) {
            return cookie.substring(name.length + 1);
          }
        }

        return null;
      }

      function setSessionCookie(value, maxAge) {
        if (!value) return;

        const PHI_8_MILLIS = 46979;

        document.cookie = `__Host-heady_session=${value}; Path=/; Max-Age=${maxAge || PHI_8_MILLIS}; HttpOnly; Secure; SameSite=Strict; Domain=.headysystems.com`;
      }

      function clearSessionCookie() {
        document.cookie =
          '__Host-heady_session=; Path=/; Max-Age=0; HttpOnly; Secure; SameSite=Strict; Domain=.headysystems.com';
      }

      window.addEventListener('message', function (event) {
        if (!isOriginWhitelisted(event.origin)) {
          console.warn('Rejected message from untrusted origin:', event.origin);
          return;
        }

        const { type, data } = event.data;

        try {
          if (type === 'getSession') {
            const sessionId = getSessionCookie();

            event.source.postMessage(
              {
                type: 'sessionResponse',
                sessionId: sessionId,
                success: true,
              },
              event.origin,
            );
          } else if (type === 'setSession') {
            const { sessionId, maxAge } = data;

            setSessionCookie(sessionId, maxAge);

            event.source.postMessage(
              {
                type: 'setSessionResponse',
                success: true,
              },
              event.origin,
            );
          } else if (type === 'clearSession') {
            clearSessionCookie();

            event.source.postMessage(
              {
                type: 'clearSessionResponse',
                success: true,
              },
              event.origin,
            );
          } else {
            console.warn('Unknown message type:', type);

            event.source.postMessage(
              {
                type: 'error',
                message: 'Unknown message type',
                success: false,
              },
              event.origin,
            );
          }
        } catch (error) {
          console.error('Error processing message:', error);

          event.source.postMessage(
            {
              type: 'error',
              message: error.message,
              success: false,
            },
            event.origin,
          );
        }
      });
    </script>
  </body>
</html>
